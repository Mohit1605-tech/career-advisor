<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Advisor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --text: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* NAVBAR */
.navbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h1 {
    font-size: 1.4rem;
    font-weight: 600;
}

.navbar span {
    color: var(--primary);
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 20px;
}

/* GRID */
.dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    transition: all 0.2s ease;
}

.card:hover {
    border-color: #d1d5db;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card h2 {
    font-size: 1.25rem;
    margin-bottom: 16px;
}

/* INPUTS */
textarea, input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 0.95rem;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

textarea:focus, input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(79,70,229,0.1);
}

/* BUTTON */
button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4338ca;
}

/* OUTPUT BOX */
.output-box {
    background: var(--primary-light);
    border-radius: 10px;
    padding: 16px;
    margin-top: 12px;
    font-size: 0.9rem;
}

/* TAGS */
.tag {
    display: inline-block;
    background: #eef2ff;
    color: var(--primary);
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 0.8rem;
    margin: 4px;
}

/* SECTION TITLES */
.section-title {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 16px;
}

/* EMPTY STATE */
.empty {
    color: var(--muted);
    font-size: 0.85rem;
}

/* MOBILE */
@media (max-width: 768px) {
    .dashboard {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>🚀 <span>AI Career Advisor</span></h1>
    <p style="color:#6b7280;font-size:0.9rem;">Smart career insights</p>
</div>

<div class="container">

    <div class="dashboard">

        <!-- AI CHAT -->
        <div class="card">
            <h2>💬 Career Assistant</h2>

            <textarea id="input" placeholder="Ask anything about your career..."></textarea>
            <button onclick="send()">Get Insights</button>

            <div id="output" class="output-box empty">
                No questions asked yet.
            </div>
        </div>

        <!-- RESUME ANALYZER -->
        <div class="card">
            <h2>📄 Resume Analyzer</h2>

            <input type="file" id="resumeFile" accept=".txt">
            <input type="text" id="role" placeholder="Target Role (e.g. Frontend Developer)">
            <button onclick="analyzeResume()">Analyze & Improve</button>

            <div class="section-title">Your Skills</div>
            <div id="skills" class="output-box empty">
                Upload resume to see extracted skills
            </div>

            <div class="section-title">Missing Skills</div>
            <div id="missing" class="output-box empty">
                Skill gaps will appear here
            </div>

            <div class="section-title">Recommendations</div>
            <div id="recommendations" class="output-box empty">
                AI suggestions will appear here
            </div>

        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
